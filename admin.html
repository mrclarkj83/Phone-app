<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | DragonMath</title>
    <link rel="stylesheet" href="styles.css?v=20260515-1" />
  </head>
  <body data-page="admin">
    <header class="app-header">
      <div>
        <p class="eyebrow">DragonMath Algebra I</p>
        <h1>Admin Dashboard</h1>
      </div>
      <div class="header-stack">
        <div class="header-stats" aria-label="Admin summary">
          <span><strong id="header-problem-count">30</strong> problems</span>
          <span><strong id="admin-teacher-count">0</strong> teachers</span>
        </div>
        <div class="auth-strip" aria-label="Google account">
          <span class="auth-dot" id="auth-dot" aria-hidden="true"></span>
          <div>
            <strong id="auth-name">Checking sign-in</strong>
            <small id="auth-email">Google authentication</small>
          </div>
          <button class="light-button" id="sign-in-button" type="button">Sign in</button>
          <button class="light-button" id="sign-out-button" type="button" hidden>Sign out</button>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <section class="status-banner" id="admin-note" aria-live="polite">
        Sign in with the admin Google account.
      </section>

      <section class="admin-grid" aria-label="Teacher management">
        <section class="admin-panel" aria-labelledby="teacher-form-heading">
          <div class="admin-panel-header">
            <div>
              <p class="eyebrow">Teacher Group</p>
              <h2 id="teacher-form-heading">Create Teacher</h2>
            </div>
          </div>

          <div class="teacher-form-grid">
            <label>
              Teacher name
              <input id="teacher-name" type="text" autocomplete="name" />
            </label>
            <label>
              Teacher email
              <input id="teacher-email" type="email" autocomplete="email" />
            </label>
          </div>

          <div class="student-picker" aria-label="Assigned students">
            <div class="student-picker-heading">
              <p class="eyebrow">Students</p>
              <h3>Assigned Roster</h3>
            </div>
            <div class="student-check-list" id="teacher-student-list"></div>
          </div>

          <div class="form-actions">
            <button class="primary-button" id="save-teacher" type="button" disabled>
              Save Teacher
            </button>
            <button class="secondary-button" id="clear-teacher-form" type="button" disabled>
              Clear
            </button>
          </div>
        </section>

        <section class="admin-panel" aria-labelledby="teacher-list-heading">
          <div class="admin-panel-header">
            <div>
              <p class="eyebrow">Access</p>
              <h2 id="teacher-list-heading">Teachers</h2>
            </div>
          </div>
          <div class="teacher-list" id="teacher-list"></div>
        </section>
      </section>
    </main>

    <script type="module" src="app.js?v=20260515-1"></script>
  </body>
</html>
