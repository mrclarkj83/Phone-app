<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freshman Algebra Assignment Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Algebra I</p>
        <h1>Linear Equations Assignment</h1>
      </div>
      <div class="header-stats" aria-label="Assignment summary">
        <span><strong id="header-problem-count">30</strong> problems</span>
        <span><strong id="header-student-count">25</strong> students</span>
      </div>
    </header>

    <main class="app-shell">
      <nav class="tabs" aria-label="App views">
        <button class="tab-button is-active" type="button" data-view="student-view">
          Student Workspace
        </button>
        <button class="tab-button" type="button" data-view="teacher-view">
          Teacher Dashboard
        </button>
      </nav>

      <section class="view is-active" id="student-view" aria-labelledby="student-heading">
        <div class="workspace-grid">
          <aside class="student-panel" aria-label="Student information">
            <h2 id="student-heading">Student</h2>
            <label for="student-select">Name</label>
            <select id="student-select"></select>

            <label for="student-id">Student ID</label>
            <input id="student-id" type="text" autocomplete="off" />

            <button class="primary-button" id="load-assignment" type="button">
              Load Assignment
            </button>

            <div class="score-box" aria-live="polite">
              <span>Current score</span>
              <strong id="current-score">0 / 30</strong>
              <small id="current-percent">0%</small>
            </div>

            <button class="submit-button" id="submit-assignment" type="button" disabled>
              Submit Grade
            </button>
            <p class="submission-note" id="submission-note"></p>
          </aside>

          <section class="assignment-panel" aria-label="Linear equation problems">
            <div class="assignment-toolbar">
              <div>
                <p class="eyebrow">Solve for x</p>
                <h2 id="assignment-title">Choose a student to begin</h2>
              </div>
              <div class="mini-metrics">
                <span id="answered-count">0 answered</span>
                <span id="correct-count">0 correct</span>
              </div>
            </div>
            <div class="problem-list" id="problem-list"></div>
          </section>
        </div>
      </section>

      <section class="view" id="teacher-view" aria-labelledby="teacher-heading">
        <div class="dashboard-grid">
          <section class="dashboard-summary" aria-label="Class summary">
            <div>
              <p class="eyebrow">Teacher</p>
              <h2 id="teacher-heading">Class Dashboard</h2>
            </div>
            <div class="summary-metrics">
              <div>
                <span>Submitted</span>
                <strong id="submitted-count">0 / 30</strong>
              </div>
              <div>
                <span>Class Average</span>
                <strong id="class-average">--</strong>
              </div>
              <div>
                <span>Highest</span>
                <strong id="highest-score">--</strong>
              </div>
            </div>
          </section>

          <section class="dashboard-table-wrap" aria-label="Submitted grades">
            <div class="table-actions">
              <h3>Roster</h3>
              <button class="secondary-button" id="reset-dashboard" type="button">
                Clear Submissions
              </button>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th scope="col">Student</th>
                    <th scope="col">ID</th>
                    <th scope="col">Status</th>
                    <th scope="col">Score</th>
                    <th scope="col">Grade</th>
                    <th scope="col">Submitted</th>
                  </tr>
                </thead>
                <tbody id="dashboard-body"></tbody>
              </table>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
